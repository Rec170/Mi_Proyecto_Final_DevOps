name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r docker/requirements.txt

      - name: Verificar importación de Flask app
        run: |
          python -c "import sys; sys.path.append('docker'); import app; print('Aplicación importada correctamente')"

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Comprimir aplicación
        run: zip -r application.zip docker/

      - name: Subir archivo a S3
        run: |
          aws s3 cp application.zip s3://devops-bucket-$(aws sts get-caller-identity --query Account --output text)/application.zip

      - name: Desplegar en EC2 usando SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user",
              "aws s3 cp s3://devops-bucket-'$(aws sts get-caller-identity --query Account --output text)'/application.zip .",
              "unzip -o application.zip",
              "cd docker",
              "sudo docker rm -f web nginx || true",
              "sudo docker build -t docker-web .",
              "sudo docker network create devops_network || true",
              "sudo docker run -d --name web -p 5000:5000 --network devops_network docker-web",
              "sudo docker run -d --name nginx -p 80:80 --network devops_network -v /home/ec2-user/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro nginx:latest"
            ]'
