name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r docker/requirements.txt

      - name: Verificar aplicación Flask
        run: python -c "import sys; sys.path.append('docker'); import app; print('OK')"

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Comprimir aplicación
        run: zip -r application.zip docker/

      - name: Subir archivo a S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws s3 cp application.zip s3://devops-bucket-$ACCOUNT_ID/application.zip

      - name: Desplegar en EC2 usando SSM
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          INSTANCE_ID=$(aws ssm describe-instance-information \
            --query "InstanceInformationList[0].InstanceId" \
            --output text)

          echo "Usando instancia: $INSTANCE_ID"

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'cd /home/ec2-user',
              'aws s3 cp s3://devops-bucket-$ACCOUNT_ID/application.zip .',
              'unzip -o application.zip',
              'cd docker',
              'sudo docker rm -f web nginx || true',
              'sudo docker build -t docker-web .',
              'sudo docker network create devops_network || true',
              'sudo docker run -d --name web -p 5000:5000 --network devops_network docker-web',
              'sudo docker run -d --name nginx -p 80:80 --network devops_network -v /home/ec2-user/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro nginx:latest'
            ]"
