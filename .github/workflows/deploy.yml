name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r docker/requirements.txt

      - name: Verificar aplicación Flask
        run: python -c "import sys; sys.path.append('docker'); import app; print('Aplicación importada correctamente')"

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Comprimir aplicación
        run: zip -r application.zip docker/

      - name: Subir archivo a S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws s3 cp application.zip s3://devops-bucket-$ACCOUNT_ID/application.zip

      - name: Simular despliegue en EC2 usando SSM
        run: |
          echo "Archivo subido a S3 correctamente."
          echo "Despliegue simulado con éxito."
